<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
      overflow: hidden;
      touch-action: none;
    }
    h1 { font-size: 1.8rem; margin-bottom: 8px; color: #00d4aa; letter-spacing: 4px; }
    #score-board { display: flex; gap: 30px; margin-bottom: 10px; font-size: 1rem; }
    #score-board span { color: #00d4aa; font-weight: bold; font-size: 1.2rem; }
    canvas { border: 3px solid #00d4aa; border-radius: 8px; box-shadow: 0 0 30px rgba(0,212,170,0.4); display: block; }
    #message { margin-top: 10px; font-size: 0.95rem; color: #aaa; text-align: center; }
    #message.game-over { color: #ff4d6d; font-size: 1.2rem; font-weight: bold; }
    #restart-btn {
      margin-top: 10px; padding: 10px 30px; background: #00d4aa;
      border: none; border-radius: 6px; color: #1a1a2e;
      font-size: 1rem; font-weight: bold; cursor: pointer; display: none;
    }
    #dpad {
      margin-top: 16px; display: grid;
      grid-template-columns: repeat(3, 60px);
      grid-template-rows: repeat(3, 60px); gap: 6px;
    }
    .btn-dir {
      background: rgba(0,212,170,0.15); border: 2px solid #00d4aa;
      border-radius: 10px; color: #00d4aa; font-size: 1.5rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      user-select: none; -webkit-tap-highlight-color: transparent;
      transition: background 0.1s; touch-action: manipulation;
    }
    .btn-dir:active { background: rgba(0,212,170,0.4); }
    .btn-empty { visibility: hidden; }
    #leaderboard-btn {
      margin-top: 10px; padding: 8px 20px; background: transparent;
      border: 2px solid #00d4aa; border-radius: 6px; color: #00d4aa;
      font-size: 0.9rem; cursor: pointer; touch-action: manipulation;
    }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 10;
      align-items: center; justify-content: center;
    }
    .modal-overlay.visible { display: flex; }
    .modal-box {
      background: #16213e; border-radius: 12px;
      padding: 24px 28px; min-width: 280px; max-width: 90vw;
    }
    #modal-lb { border: 2px solid #00d4aa; box-shadow: 0 0 40px rgba(0,212,170,0.3); }
    #modal-name { border: 2px solid #ff4d6d; box-shadow: 0 0 40px rgba(255,77,109,0.3); text-align: center; }

    #modal-lb h2 { color: #00d4aa; text-align: center; margin-bottom: 16px; letter-spacing: 2px; }
    #lb-list { list-style: none; max-height: 320px; overflow-y: auto; }
    #lb-list li {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 1rem;
    }
    #lb-list li:last-child { border-bottom: none; }
    .rank {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 0.85rem; flex-shrink: 0;
    }
    .rank-1 { background: #ffd700; color: #1a1a2e; }
    .rank-2 { background: #c0c0c0; color: #1a1a2e; }
    .rank-3 { background: #cd7f32; color: #1a1a2e; }
    .rank-n  { background: rgba(255,255,255,0.1); color: #aaa; }
    .lb-name { flex: 1; }
    .lb-score { color: #00d4aa; font-weight: bold; }
    .lb-empty { text-align: center; color: #555; padding: 20px 0; font-size: 0.9rem; }
    .lb-loading { text-align: center; color: #aaa; padding: 20px 0; font-size: 0.9rem; }
    #modal-close {
      margin-top: 16px; width: 100%; padding: 10px;
      background: #00d4aa; border: none; border-radius: 6px;
      color: #1a1a2e; font-size: 1rem; font-weight: bold; cursor: pointer;
    }

    #modal-name h2 { color: #ff4d6d; margin-bottom: 6px; }
    #modal-name p { color: #aaa; font-size: 0.9rem; margin-bottom: 16px; }
    #name-input {
      width: 100%; padding: 10px 12px;
      background: rgba(255,255,255,0.07); border: 2px solid #00d4aa;
      border-radius: 6px; color: #eee; font-size: 1rem;
      text-align: center; outline: none; margin-bottom: 14px;
    }
    #name-input:focus { border-color: #00ffcc; }
    #name-submit {
      width: 100%; padding: 10px; background: #00d4aa;
      border: none; border-radius: 6px; color: #1a1a2e;
      font-size: 1rem; font-weight: bold; cursor: pointer;
    }
    #name-submit:disabled { background: #555; cursor: not-allowed; }

    /* Config Firebase manquante */
    #firebase-warning {
      display: none;
      background: rgba(255,77,109,0.15); border: 1px solid #ff4d6d;
      border-radius: 8px; padding: 10px 14px; margin-top: 8px;
      font-size: 0.8rem; color: #ff4d6d; text-align: center; max-width: 360px;
    }
  </style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="score-board">
    <div>Score: <span id="score">0</span></div>
    <div>Record: <span id="best">0</span></div>
  </div>
  <canvas id="game"></canvas>
  <div id="message">Appuie sur Play pour commencer</div>
  <button id="restart-btn" onclick="startGame()">Rejouer</button>
  <button id="leaderboard-btn" onclick="showLeaderboard()">Classement</button>
  <div id="firebase-warning">
    Configure Firebase dans le code pour activer le classement en ligne.
  </div>

  <div id="dpad">
    <div class="btn-empty"></div>
    <div class="btn-dir" id="btn-up">▲</div>
    <div class="btn-empty"></div>
    <div class="btn-dir" id="btn-left">◀</div>
    <div class="btn-dir" id="btn-start" onclick="if(!started||dead) startGame()">▶</div>
    <div class="btn-dir" id="btn-right">▶</div>
    <div class="btn-empty"></div>
    <div class="btn-dir" id="btn-down">▼</div>
    <div class="btn-empty"></div>
  </div>

  <!-- Modal classement -->
  <div class="modal-overlay" id="overlay-lb">
    <div class="modal-box" id="modal-lb">
      <h2>CLASSEMENT</h2>
      <ul id="lb-list"><li class="lb-loading">Chargement...</li></ul>
      <button id="modal-close" onclick="hideLb()">Fermer</button>
    </div>
  </div>

  <!-- Modal nom -->
  <div class="modal-overlay" id="overlay-name">
    <div class="modal-box" id="modal-name">
      <h2>Game Over</h2>
      <p>Ton score : <strong id="score-display"></strong></p>
      <input id="name-input" type="text" maxlength="12" placeholder="Ton pseudo" autocomplete="off">
      <button id="name-submit" onclick="submitScore()">Enregistrer</button>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, query, orderByChild, limitToLast, onValue }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // ============================================================
    // CONFIGURATION FIREBASE
    // Remplace ces valeurs par celles de ton projet Firebase :
    // https://console.firebase.google.com → Paramètres du projet
    // ============================================================
    const FIREBASE_CONFIG = {
      apiKey:            "REMPLACE_MOI",
      authDomain:        "REMPLACE_MOI",
      databaseURL:       "REMPLACE_MOI",   // ex: https://mon-projet-default-rtdb.firebaseio.com
      projectId:         "REMPLACE_MOI",
      storageBucket:     "REMPLACE_MOI",
      messagingSenderId: "REMPLACE_MOI",
      appId:             "REMPLACE_MOI"
    };
    // ============================================================

    let db = null;
    const configured = FIREBASE_CONFIG.databaseURL !== "REMPLACE_MOI";

    if (configured) {
      try {
        const app = initializeApp(FIREBASE_CONFIG);
        db = getDatabase(app);
      } catch(e) {
        console.error("Firebase init error:", e);
      }
    } else {
      document.getElementById('firebase-warning').style.display = 'block';
    }

    // Expose aux fonctions globales
    window._fbReady = true;
    window._db = db;
    window._fbPush = push;
    window._fbRef = ref;
    window._fbQuery = query;
    window._fbOrderByChild = orderByChild;
    window._fbLimitToLast = limitToLast;
    window._fbOnValue = onValue;
    window._fbConfigured = configured;
  </script>

  <script>
    // ─── Jeu ───────────────────────────────────────────────────
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const size = Math.min(window.innerWidth - 20, window.innerHeight - 280, 360);
    canvas.width = size;
    canvas.height = size;

    const CELL = Math.floor(size / 20);
    const COLS = Math.floor(canvas.width / CELL);
    const ROWS = Math.floor(canvas.height / CELL);

    let snake, dir, nextDir, food, score, best = 0, loop, started, dead;

    function init() {
      const mx = Math.floor(COLS / 2), my = Math.floor(ROWS / 2);
      snake = [{ x: mx, y: my }, { x: mx-1, y: my }, { x: mx-2, y: my }];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0; dead = false; started = false;
      placeFood(); updateScore(); draw();
    }

    function placeFood() {
      let pos;
      do { pos = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) }; }
      while (snake.some(s => s.x===pos.x && s.y===pos.y));
      food = pos;
    }

    function startGame() {
      clearInterval(loop);
      document.getElementById('restart-btn').style.display = 'none';
      document.getElementById('message').className = '';
      document.getElementById('message').textContent = '';
      document.getElementById('btn-start').textContent = '⏸';
      init(); started = true;
      loop = setInterval(tick, 130);
    }

    function tick() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
      if (snake.some(s => s.x===head.x && s.y===head.y)) return gameOver();
      snake.unshift(head);
      if (head.x===food.x && head.y===food.y) {
        score++; if (score > best) best = score;
        updateScore(); placeFood();
      } else snake.pop();
      draw();
    }

    function gameOver() {
      clearInterval(loop); dead = true; draw();
      document.getElementById('btn-start').textContent = '▶';
      if (score > 0) {
        document.getElementById('score-display').textContent = score;
        document.getElementById('name-input').value = '';
        document.getElementById('name-submit').disabled = false;
        document.getElementById('name-submit').textContent = 'Enregistrer';
        document.getElementById('overlay-name').classList.add('visible');
        setTimeout(() => document.getElementById('name-input').focus(), 100);
      } else {
        document.getElementById('message').textContent = 'Game Over ! Score : 0';
        document.getElementById('message').className = 'game-over';
        document.getElementById('restart-btn').style.display = 'inline-block';
      }
    }

    window.submitScore = function() {
      const name = (document.getElementById('name-input').value.trim() || 'Anonyme').slice(0, 12);
      const btn = document.getElementById('name-submit');
      btn.disabled = true;
      btn.textContent = '...';

      const closeAndShow = () => {
        document.getElementById('overlay-name').classList.remove('visible');
        document.getElementById('message').textContent = 'Game Over ! Score : ' + score;
        document.getElementById('message').className = 'game-over';
        document.getElementById('restart-btn').style.display = 'inline-block';
      };

      if (window._fbConfigured && window._db) {
        const scoresRef = window._fbRef(window._db, 'scores');
        window._fbPush(scoresRef, { name, score, ts: Date.now() })
          .then(closeAndShow)
          .catch(() => closeAndShow());
      } else {
        // Fallback localStorage si Firebase non configuré
        try {
          const arr = JSON.parse(localStorage.getItem('snake_scores') || '[]');
          arr.push({ name, score });
          arr.sort((a,b) => b.score - a.score);
          arr.splice(10);
          localStorage.setItem('snake_scores', JSON.stringify(arr));
          if (arr.length) best = arr[0].score;
          updateScore();
        } catch(e) {}
        closeAndShow();
      }
    };

    document.getElementById('name-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') window.submitScore();
    });

    function updateScore() {
      document.getElementById('score').textContent = score;
      document.getElementById('best').textContent = best;
    }

    // ─── Classement ────────────────────────────────────────────
    window.showLeaderboard = function() {
      document.getElementById('overlay-lb').classList.add('visible');
      const list = document.getElementById('lb-list');
      list.innerHTML = '<li class="lb-loading">Chargement...</li>';

      if (window._fbConfigured && window._db) {
        const q = window._fbQuery(
          window._fbRef(window._db, 'scores'),
          window._fbOrderByChild('score'),
          window._fbLimitToLast(10)
        );
        window._fbOnValue(q, snap => {
          const entries = [];
          snap.forEach(child => entries.push(child.val()));
          entries.sort((a, b) => b.score - a.score);
          renderLb(entries);
          // Met a jour le record local
          if (entries.length) { best = entries[0].score; updateScore(); }
        }, { onlyOnce: true });
      } else {
        // Fallback localStorage
        try {
          const arr = JSON.parse(localStorage.getItem('snake_scores') || '[]');
          renderLb(arr);
        } catch(e) { renderLb([]); }
      }
    };

    function renderLb(entries) {
      const list = document.getElementById('lb-list');
      list.innerHTML = '';
      if (!entries.length) {
        list.innerHTML = '<li class="lb-empty">Aucun score encore !</li>';
        return;
      }
      entries.forEach((e, i) => {
        const li = document.createElement('li');
        const rc = i===0 ? 'rank-1' : i===1 ? 'rank-2' : i===2 ? 'rank-3' : 'rank-n';
        li.innerHTML = `<div class="rank ${rc}">${i+1}</div>
          <span class="lb-name">${esc(e.name)}</span>
          <span class="lb-score">${e.score}</span>`;
        list.appendChild(li);
      });
    }

    window.hideLb = function() {
      document.getElementById('overlay-lb').classList.remove('visible');
    };

    document.getElementById('overlay-lb').addEventListener('click', function(e) {
      if (e.target === this) window.hideLb();
    });

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ─── Rendu ─────────────────────────────────────────────────
    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
      ctx.arcTo(x+w, y, x+w, y+r, r); ctx.lineTo(x+w, y+h-r);
      ctx.arcTo(x+w, y+h, x+w-r, y+h, r); ctx.lineTo(x+r, y+h);
      ctx.arcTo(x, y+h, x, y+h-r, r); ctx.lineTo(x, y+r);
      ctx.arcTo(x, y, x+r, y, r); ctx.closePath();
    }

    function draw() {
      ctx.fillStyle = '#0f0f23';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 0.5;
      for (let x=0; x<=COLS; x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,canvas.height); ctx.stroke(); }
      for (let y=0; y<=ROWS; y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(canvas.width,y*CELL); ctx.stroke(); }

      ctx.fillStyle='#ff4d6d'; ctx.shadowColor='#ff4d6d'; ctx.shadowBlur=12;
      ctx.beginPath(); ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;

      snake.forEach((seg, i) => {
        const ratio = 1 - i/snake.length;
        ctx.fillStyle = dead
          ? `rgba(150,150,150,${0.4+ratio*0.6})`
          : `rgba(0,${Math.floor(160+ratio*95)},${Math.floor(130+ratio*80)},1)`;
        ctx.shadowColor = dead ? 'transparent' : '#00d4aa';
        ctx.shadowBlur = i===0 ? 10 : 0;
        const p = i===0 ? 1 : 2;
        roundRect(seg.x*CELL+p, seg.y*CELL+p, CELL-p*2, CELL-p*2, 3);
        ctx.fill(); ctx.shadowBlur=0;
        if (i===0) {
          ctx.fillStyle='#1a1a2e';
          const eyes = dir.x!==0
            ? [{dx:dir.x>0?CELL-5:3,dy:4},{dx:dir.x>0?CELL-5:3,dy:CELL-6}]
            : [{dx:4,dy:dir.y>0?CELL-5:3},{dx:CELL-6,dy:dir.y>0?CELL-5:3}];
          eyes.forEach(e => { ctx.beginPath(); ctx.arc(seg.x*CELL+e.dx, seg.y*CELL+e.dy, 2, 0, Math.PI*2); ctx.fill(); });
        }
      });
    }

    // ─── Controles touch ───────────────────────────────────────
    let tx=0, ty=0;
    canvas.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; if(!started||dead) startGame(); }, {passive:true});
    canvas.addEventListener('touchend', e => {
      const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
      if (Math.abs(dx)<10 && Math.abs(dy)<10) return;
      const nd = Math.abs(dx)>Math.abs(dy) ? (dx>0?{x:1,y:0}:{x:-1,y:0}) : (dy>0?{x:0,y:1}:{x:0,y:-1});
      if (nd.x!==-dir.x||nd.y!==-dir.y) nextDir=nd;
    }, {passive:true});

    function setDir(d) {
      if (!started||dead) { startGame(); return; }
      if (d.x!==-dir.x||d.y!==-dir.y) nextDir=d;
    }
    ['up','down','left','right'].forEach(k => {
      const dirs = {up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};
      const el = document.getElementById('btn-'+k);
      el.addEventListener('touchstart', e => { e.preventDefault(); setDir(dirs[k]); });
      el.addEventListener('click', () => setDir(dirs[k]));
    });

    document.addEventListener('keydown', e => {
      const keys = {ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},z:{x:0,y:-1},s:{x:0,y:1},q:{x:-1,y:0},d:{x:1,y:0}};
      const nd = keys[e.key];
      if (nd) { e.preventDefault(); if(!started||dead){startGame();return;} if(nd.x!==-dir.x||nd.y!==-dir.y) nextDir=nd; }
    });

    init();
  </script>
</body>
</html>
