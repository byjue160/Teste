<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zone.io — Global Leaderboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    .page-wrap {
      max-width: 720px;
      margin: 0 auto;
    }

    .lb-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .lb-logo {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 2px;
      color: #fff;
    }
    .lb-logo span { color: #e74c3c; }

    .lb-title {
      font-size: 1.1rem;
      color: #aaa;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .back-link {
      color: #e74c3c;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 1px;
      border: 1px solid #e74c3c44;
      padding: 6px 14px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .back-link:hover { background: #e74c3c22; }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1a1a2e;
      border: 1px solid #2a2a4e;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.75rem;
      color: #aaa;
      letter-spacing: 1px;
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #2ecc71;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    .lb-table-wrap {
      background: #111118;
      border: 1px solid #1e1e30;
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: #16161f;
      color: #666;
      font-size: 0.7rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid #1e1e30;
    }
    thead th.right { text-align: right; }

    tbody tr {
      border-bottom: 1px solid #16161f;
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #1a1a28; }

    tbody tr.highlight-me {
      background: #1a2a1a;
      border-left: 3px solid #2ecc71;
    }
    tbody tr.highlight-me:hover { background: #1f321f; }

    td {
      padding: 11px 16px;
      font-size: 0.9rem;
    }
    td.right { text-align: right; }

    .rank-cell {
      width: 48px;
      font-weight: 700;
      color: #555;
      font-size: 0.85rem;
    }
    .rank-badge {
      font-size: 1.1rem;
    }

    .name-cell {
      font-weight: 600;
      color: #e0e0e0;
    }
    .name-me-tag {
      font-size: 0.65rem;
      color: #2ecc71;
      font-weight: 700;
      margin-left: 6px;
      letter-spacing: 1px;
      vertical-align: middle;
    }

    .elo-cell {
      font-weight: 800;
      color: #f1c40f;
      font-size: 0.95rem;
    }

    .wins-cell  { color: #2ecc71; font-weight: 600; }
    .games-cell { color: #888; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #444;
      font-size: 0.95rem;
    }
    .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

    .lb-footer {
      text-align: center;
      margin-top: 20px;
      color: #333;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="page-wrap">

    <div class="lb-header">
      <div>
        <div class="lb-logo">ZONE<span>.io</span></div>
        <div class="lb-title">Global ELO Leaderboard</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <div class="live-badge"><span class="live-dot"></span> LIVE</div>
        <a class="back-link" href="/">← Home</a>
      </div>
    </div>

    <div class="lb-table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Player</th>
            <th class="right">ELO</th>
            <th class="right">Kills</th>
            <th class="right">Deaths</th>
          </tr>
        </thead>
        <tbody id="lbBody">
          <tr><td colspan="5"><div class="empty-state"><div class="empty-icon">⏳</div>Loading…</div></td></tr>
        </tbody>
      </table>
    </div>

    <div class="lb-footer">Top 100 · Updates in real-time</div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="leaderboard.js"></script>
</body>
</html>
